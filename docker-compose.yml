services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: facarbon_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-facarbon}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: .
      target: backend
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: facarbon_db
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-facarbon}
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: .
      target: frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
